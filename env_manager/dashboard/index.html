<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>env-manager — Dashboard</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --dim: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --yellow: #d2991d;
  --red: #f85149;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
}
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; gap: 16px;
}
header h1 { font-size: 18px; color: var(--accent); }
header .status { font-size: 12px; color: var(--dim); margin-left: auto; }
nav { display: flex; gap: 2px; padding: 0 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
nav button {
  background: none; border: none; color: var(--dim); padding: 10px 16px;
  cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent;
}
nav button:hover { color: var(--text); }
nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
main { padding: 20px 24px; max-width: 1200px; }
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.toolbar input, .toolbar select, .toolbar button {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 6px 12px; border-radius: 6px; font-size: 13px;
}
.toolbar button { cursor: pointer; }
.toolbar button:hover { border-color: var(--accent); }
.toolbar button.danger { color: var(--red); border-color: var(--red); }
.toolbar button.confirm { background: var(--accent); color: #fff; border-color: var(--accent); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
th { color: var(--dim); font-weight: 600; }
tr:hover { background: var(--surface); }
.badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.badge.healthy { background: #1a3a1a; color: var(--green); }
.badge.degraded { background: #3a2a1a; color: var(--yellow); }
.badge.broken { background: #3a1a1a; color: var(--red); }
.badge.stale { background: #2a2a1a; color: var(--yellow); }
.badge.orphaned { background: #3a1a1a; color: var(--red); }
.summary { display: flex; gap: 16px; margin-bottom: 20px; }
.summary .card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; flex: 1; text-align: center;
}
.summary .card .num { font-size: 28px; font-weight: 700; }
.summary .card .label { font-size: 12px; color: var(--dim); margin-top: 4px; }
.hidden { display: none; }
.loading { color: var(--dim); padding: 40px; text-align: center; }
#toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px;
  font-size: 13px; z-index: 100; }
</style>
</head>
<body>

<header>
  <h1>env-manager</h1>
  <span style="font-size:13px;color:var(--dim);">Dashboard</span>
  <span class="status" id="apiStatus">connecting...</span>
</header>

<nav>
  <button class="active" data-tab="envs">Environments</button>
  <button data-tab="doctor">Doctor</button>
  <button data-tab="snapshots">Snapshots</button>
  <button data-tab="cleanup">Cleanup</button>
</nav>

<main>
  <!-- ENVS TAB -->
  <div id="tab-envs">
    <div class="summary" id="envSummary"></div>
    <div class="toolbar">
      <input type="text" id="envSearch" placeholder="Search...">
      <select id="envLang"><option value="">All languages</option></select>
      <button onclick="refreshEnvs()">Refresh</button>
      <button class="confirm" onclick="window.open('/api/envs', '_blank')">API</button>
    </div>
    <div id="envTable"></div>
  </div>

  <!-- DOCTOR TAB -->
  <div id="tab-doctor" class="hidden">
    <div class="toolbar">
      <button class="confirm" onclick="runDoctor()">Run Doctor (All)</button>
    </div>
    <div id="doctorResults" class="loading">Click "Run Doctor" to check health of all environments.</div>
  </div>

  <!-- SNAPSHOTS TAB -->
  <div id="tab-snapshots" class="hidden">
    <div class="toolbar">
      <button onclick="refreshSnapshots()">Refresh</button>
      <button class="danger" onclick="pruneSnapshots()">Prune Old</button>
    </div>
    <div id="snapshotTable"></div>
  </div>

  <!-- CLEANUP TAB -->
  <div id="tab-cleanup" class="hidden">
    <div class="toolbar">
      <label style="color:var(--dim);font-size:13px;">Stale days:</label>
      <input type="number" id="cleanupDays" value="60" style="width:70px;">
      <label style="color:var(--dim);font-size:13px;display:flex;align-items:center;gap:4px;">
        <input type="checkbox" id="cleanupOrphaned"> Orphaned
      </label>
      <label style="color:var(--dim);font-size:13px;display:flex;align-items:center;gap:4px;">
        <input type="checkbox" id="cleanupSnapshot" checked> Snapshot
      </label>
      <button onclick="previewCleanup()">Preview (dry-run)</button>
      <button class="danger" onclick="executeCleanup()">Execute Cleanup</button>
    </div>
    <div id="cleanupResults" class="loading">Click "Preview" to see what would be cleaned up.</div>
  </div>
</main>

<div id="toast" class="hidden"></div>

<script>
const API = '/api';
let ws = null;

// Init
document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
    document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
    if (btn.dataset.tab === 'envs') refreshEnvs();
    if (btn.dataset.tab === 'snapshots') refreshSnapshots();
  });
});

connectWS();
refreshEnvs();

// Toast
function toast(msg, dur=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), dur);
}

// WebSocket
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws/events');
  ws.onopen = () => document.getElementById('apiStatus').textContent = 'live';
  ws.onclose = () => { document.getElementById('apiStatus').textContent = 'offline'; setTimeout(connectWS, 5000); };
  ws.onmessage = (e) => { const d = JSON.parse(e.data); if (d.event === 'scan') refreshEnvs(); };
}

// Envs
async function refreshEnvs() {
  try {
    const r = await fetch(API + '/envs');
    const data = await r.json();
    renderEnvSummary(data);
    renderEnvTable(data.environments);
    loadLanguages(data.environments);
  } catch(e) { toast('API connection failed'); }
}

function renderEnvSummary(data) {
  const envs = data.environments;
  const healthy = envs.filter(e => e.last_health_result === 'healthy').length;
  const broken = envs.filter(e => e.last_health_result === 'broken').length;
  const total = envs.length;
  const totalSize = envs.reduce((s, e) => s + (e.size_bytes || 0), 0);
  document.getElementById('envSummary').innerHTML = `
    <div class="card"><div class="num" style="color:var(--accent);">${total}</div><div class="label">Environments</div></div>
    <div class="card"><div class="num" style="color:var(--green);">${healthy}</div><div class="label">Healthy</div></div>
    <div class="card"><div class="num" style="color:var(--red);">${broken}</div><div class="label">Broken</div></div>
    <div class="card"><div class="num" style="color:var(--dim);">${fmtSize(totalSize)}</div><div class="label">Total Size</div></div>
  `;
}

function renderEnvTable(envs) {
  const search = (document.getElementById('envSearch')?.value || '').toLowerCase();
  const lang = document.getElementById('envLang')?.value || '';
  let filtered = envs;
  if (search) filtered = filtered.filter(e => (e.project_name||e.path||'').toLowerCase().includes(search));
  if (lang) filtered = filtered.filter(e => e.language === lang);

  if (filtered.length === 0) {
    document.getElementById('envTable').innerHTML = '<p class="loading">No environments found. Run <code>envs scan</code> first.</p>';
    return;
  }

  const rows = filtered.map(e => `
    <tr>
      <td style="color:var(--accent);">${e.project_name || '-'}</td>
      <td>${e.language} ${e.version || ''}</td>
      <td>${e.tool || '-'}</td>
      <td>${fmtSize(e.size_bytes)}</td>
      <td><span class="badge ${e.last_health_result || ''}">${e.last_health_result || 'unchecked'}</span></td>
      <td style="color:var(--dim);font-size:11px;">${(e.path||'').substring(0,40)}</td>
    </tr>
  `).join('');

  document.getElementById('envTable').innerHTML = `
    <table>
      <thead><tr><th>Project</th><th>Version</th><th>Tool</th><th>Size</th><th>Health</th><th>Path</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function loadLanguages(envs) {
  const langs = [...new Set(envs.map(e => e.language))].sort();
  const sel = document.getElementById('envLang');
  langs.forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = l; sel.appendChild(o); });
}

document.getElementById('envSearch').addEventListener('input', refreshEnvs);
document.getElementById('envLang').addEventListener('change', refreshEnvs);

// Doctor
async function runDoctor() {
  document.getElementById('doctorResults').innerHTML = '<p class="loading">Running health checks...</p>';
  try {
    const r = await fetch(API + '/envs');
    const data = await r.json();
    // Simple client-side doctor: fetch each env's health
    const results = [];
    for (const env of data.environments) {
      // Just display what the DB has
      results.push(env);
    }
    renderDoctorResults(results);
  } catch(e) { toast('Doctor check failed'); }
}

function renderDoctorResults(envs) {
  if (envs.length === 0) {
    document.getElementById('doctorResults').innerHTML = '<p class="loading">No environments to check.</p>';
    return;
  }
  const rows = envs.map(e => {
    const status = e.last_health_result || 'unchecked';
    const cls = status === 'healthy' ? 'healthy' : status === 'broken' ? 'broken' : 'degraded';
    const icon = status === 'healthy' ? 'OK' : status === 'broken' ? 'BROKEN' : '-';
    return `<tr><td>${e.project_name||e.path}</td><td>${e.language} ${e.version}</td><td><span class="badge ${cls}">${icon}</span></td></tr>`;
  }).join('');

  const h = envs.filter(e => e.last_health_result === 'healthy').length;
  const b = envs.filter(e => e.last_health_result === 'broken').length;
  document.getElementById('doctorResults').innerHTML = `
    <div class="summary">
      <div class="card"><div class="num" style="color:var(--green);">${h}</div><div class="label">Healthy</div></div>
      <div class="card"><div class="num" style="color:var(--red);">${b}</div><div class="label">Broken</div></div>
      <div class="card"><div class="num" style="color:var(--dim);">${envs.length-h-b}</div><div class="label">Unknown</div></div>
    </div>
    <table><thead><tr><th>Project</th><th>Version</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>
  `;
}

// Snapshots
async function refreshSnapshots() {
  try {
    const r = await fetch(API + '/snapshots');
    const data = await r.json();
    renderSnapshotTable(data.snapshots);
  } catch(e) { toast('Failed to load snapshots'); }
}

function renderSnapshotTable(snaps) {
  if (!snaps || snaps.length === 0) {
    document.getElementById('snapshotTable').innerHTML = '<p class="loading">No snapshots available.</p>';
    return;
  }
  const rows = snaps.map(s => `
    <tr>
      <td>v${s.version}</td>
      <td>${s.language || '-'}</td>
      <td>${JSON.parse(s.frozen_deps||'{}').length || 0} pkgs</td>
      <td style="color:var(--dim);">${s.created_at}</td>
    </tr>
  `).join('');
  document.getElementById('snapshotTable').innerHTML = `
    <table><thead><tr><th>Version</th><th>Language</th><th>Packages</th><th>Created</th></tr></thead><tbody>${rows}</tbody></table>
  `;
}

async function pruneSnapshots() {
  if (!confirm('Delete old snapshot versions beyond 5 most recent per environment?')) return;
  toast('Snapshot pruning not yet available via dashboard. Use: envs snapshots prune --confirm');
}

// Cleanup
async function previewCleanup() {
  const days = document.getElementById('cleanupDays').value || 60;
  document.getElementById('cleanupResults').innerHTML = '<p class="loading">Analyzing...</p>';
  try {
    const r = await fetch(API + '/envs');
    const data = await r.json();
    const cutoff = new Date(Date.now() - days * 86400000).toISOString();
    const stale = data.environments.filter(e => {
      if (!e.last_used_at) return true;
      return new Date(e.last_used_at) < new Date(Date.now() - days * 86400000);
    });
    const totalSize = stale.reduce((s, e) => s + (e.size_bytes||0), 0);
    renderCleanupPreview(stale, totalSize, days);
  } catch(e) { toast('Cleanup preview failed'); }
}

function renderCleanupPreview(envs, totalSize, days) {
  if (envs.length === 0) {
    document.getElementById('cleanupResults').innerHTML = `<p style="color:var(--green);">No stale environments found (unused > ${days} days).</p>`;
    return;
  }
  const rows = envs.map(e => `
    <tr>
      <td>${e.project_name||e.path}</td>
      <td>${e.language}</td>
      <td>${fmtSize(e.size_bytes)}</td>
      <td style="color:var(--dim);">${e.last_used_at ? new Date(e.last_used_at).toLocaleDateString() : 'never'}</td>
    </tr>
  `).join('');
  document.getElementById('cleanupResults').innerHTML = `
    <p style="color:var(--red);margin-bottom:12px;">${envs.length} environments stale (>${days} days). Would free <strong>${fmtSize(totalSize)}</strong>.</p>
    <table><thead><tr><th>Project</th><th>Language</th><th>Size</th><th>Last Used</th></tr></thead><tbody>${rows}</tbody></table>
    <p style="margin-top:12px;color:var(--dim);">Run <code>envs cleanup --stale ${days} --dry-run</code> in terminal for full preview.</p>
  `;
}

async function executeCleanup() {
  if (!confirm('This will delete environments. Are you sure?')) return;
  toast('Use: envs cleanup --stale ' + (document.getElementById('cleanupDays').value||60) + ' --confirm --snapshot');
}

function fmtSize(b) {
  if (!b) return '0 B';
  if (b >= 1e9) return (b/1e9).toFixed(1) + ' GB';
  if (b >= 1e6) return (b/1e6).toFixed(1) + ' MB';
  if (b >= 1e3) return (b/1e3).toFixed(1) + ' KB';
  return b + ' B';
}
</script>
</body>
</html>
